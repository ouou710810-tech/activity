<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典打地鼠</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: #a8e6cf; /* Soft cute green */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s;
        }

        h1 {
            color: #333;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            margin-top: 0;
            font-size: 3.5rem;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            background: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            border: 4px solid #333;
            transition: all 0.2s;
        }

        .stats.danger-time {
            animation: flashRed 0.5s infinite;
            color: #fff;
            border-color: #d32f2f;
        }

        @keyframes flashRed {
            0%, 100% { background-color: #ff5252; box-shadow: 0 8px 0 #d32f2f, 0 0 20px #ff5252; }
            50% { background-color: #ff8a80; box-shadow: 0 8px 0 #d32f2f, 0 0 10px #ff8a80; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            background-color: #81c784;
            padding: 30px;
            border-radius: 30px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1), 0 15px 0 #4caf50;
            border: 4px solid #333;
        }

        .hole {
            width: 110px;
            height: 110px;
            background-color: #795548; /* Cute brown */
            /* Hand-drawn irregular border radius */
            border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 15px 25px rgba(0,0,0,0.6), 0 5px 0 #5d4037;
            border: 3px solid #3e2723;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            font-size: 80px;
            line-height: 110px;
            text-align: center;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 100%;
            /* Extra bouncy pop */
            transition: top 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            transform-origin: bottom center;
        }

        .mole.active {
            top: 10%;
        }

        .mole.flying {
            animation: flyOut 0.5s ease-out forwards;
        }

        @keyframes flyOut {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) rotate(720deg) scale(0.2); opacity: 0; }
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleAnim 0.6s ease-out forwards;
            z-index: 20;
            border: 2px solid rgba(0,0,0,0.2);
        }

        @keyframes particleAnim {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Screen Shake */
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(3px, 0px) rotate(1deg); }
            60% { transform: translate(-2px, 2px) rotate(0deg); }
            80% { transform: translate(2px, -1px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Floating text animation */
        .score-float {
            position: absolute;
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 10;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.2);
        }

        .score-float.positive { color: #ff9800; }
        .score-float.negative { color: #f44336; }
        
        .combo-text {
            position: absolute;
            font-size: 40px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: 3px 3px 0 #ff9800, -2px -2px 0 #ff9800, 2px -2px 0 #ff9800, -2px 2px 0 #ff9800, 5px 5px 0 rgba(0,0,0,0.3);
            pointer-events: none;
            animation: comboPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 15;
            text-align: center;
        }

        @keyframes comboPop {
            0% { opacity: 0; transform: scale(0.5) translateY(20px) rotate(-10deg); }
            20% { opacity: 1; transform: scale(1.2) translateY(-20px) rotate(5deg); }
            80% { opacity: 1; transform: scale(1) translateY(-30px) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.5) translateY(-50px) rotate(10deg); }
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(10px) scale(0.5); }
            20% { opacity: 1; transform: translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fff;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 0 rgba(0,0,0,0.1), inset 0 0 0 8px #ffb74d;
            border: 4px solid #333;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .modal h2 {
            margin-top: 0;
            color: #333;
            font-size: 3.5rem;
            text-shadow: 2px 2px 0 #ffb74d;
        }

        .modal p {
            font-size: 2rem;
            color: #555;
            margin: 20px 0;
            font-weight: bold;
        }

        .btn {
            background-color: #ff9800;
            color: white;
            border: 4px solid #333;
            padding: 15px 40px;
            font-size: 2rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #e65100;
            transition: all 0.1s;
        }

        .btn:hover {
            background-color: #ffb74d;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #e65100;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #e65100;
        }
    </style>
</head>
<body>

    <h1>🐹 經典打地鼠 🐹</h1>
    <div class="stats" id="statsBar">
        <div>時間: <span id="time">30</span> 秒</div>
        <div>分數: <span id="score">0</span></div>
    </div>

    <div class="grid" id="grid">
        <div class="hole" data-index="0"><div class="mole">🐹</div></div>
        <div class="hole" data-index="1"><div class="mole">🐹</div></div>
        <div class="hole" data-index="2"><div class="mole">🐹</div></div>
        <div class="hole" data-index="3"><div class="mole">🐹</div></div>
        <div class="hole" data-index="4"><div class="mole">🐹</div></div>
        <div class="hole" data-index="5"><div class="mole">🐹</div></div>
        <div class="hole" data-index="6"><div class="mole">🐹</div></div>
        <div class="hole" data-index="7"><div class="mole">🐹</div></div>
        <div class="hole" data-index="8"><div class="mole">🐹</div></div>
    </div>

    <div class="modal" id="startModal" style="display: flex;">
        <div class="modal-content">
            <h2>打地鼠準備！</h2>
            <p>打中地鼠 <span style="color: #ff9800">+10</span> 分<br>點到空洞 <span style="color: #f44336">-5</span> 分</p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>時間到！</h2>
            <p>你的最終分數是：<br><strong id="finalScore" style="font-size: 4rem; color: #ff5722; text-shadow: 2px 2px 0px #333;">0</strong></p>
            <button class="btn" onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // Web Audio API Sound System
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'pop') {
                // Happy pop sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'bonk') {
                // Hit sound
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                gainNode.gain.setValueAtTime(1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'oops') {
                // Missed/Empty hole sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'tick') {
                // Ticking sound
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        }

        // Game State
        let score = 0;
        let timeLeft = 30;
        let activeHole = -1;
        let gameInterval;
        let moleTimeout;
        let isPlaying = false;
        let combo = 0;

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const statsBar = document.getElementById('statsBar');
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const modal = document.getElementById('gameOverModal');
        const startModal = document.getElementById('startModal');
        const finalScoreEl = document.getElementById('finalScore');

        // Particle System
        function createParticles(x, y) {
            const colors = ['#ffeb3b', '#ff9800', '#4caf50', '#03a9f4', '#e91e63'];
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = (x - 6) + 'px';
                particle.style.top = (y - 6) + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 40 + Math.random() * 60;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                setTimeout(() => particle.remove(), 600);
            }
        }

        // Floating Text
        function showFloatingText(x, y, text, isPositive, isCombo = false) {
            const el = document.createElement('div');
            el.className = isCombo ? 'combo-text' : `score-float ${isPositive ? 'positive' : 'negative'}`;
            el.innerText = text;
            
            if (isCombo) {
                // Center combo text roughly
                el.style.left = `${window.innerWidth / 2 - 100}px`;
                el.style.top = `${y - 100}px`;
            } else {
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
            }
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), isCombo ? 1000 : 800);
        }

        // Interactions
        holes.forEach((hole, index) => {
            // Use pointerdown to handle both mouse and touch nicely
            hole.addEventListener('pointerdown', (e) => {
                if (!isPlaying) return;
                initAudio(); // Initialize audio on first interaction

                const rect = hole.getBoundingClientRect();
                const clickX = e.clientX || rect.left + rect.width / 2;
                const clickY = e.clientY || rect.top + rect.height / 2;

                if (index === activeHole) {
                    // Hit Mole!
                    playSound('bonk');
                    score += 10;
                    combo++;
                    scoreEl.innerText = score;
                    
                    showFloatingText(clickX - 20, clickY - 40, '+10', true);
                    createParticles(clickX, clickY);

                    if (combo >= 3) {
                        showFloatingText(clickX, clickY, `COMBO x${combo}!`, true, true);
                    }

                    // Flying animation
                    const hitMole = moles[activeHole];
                    hitMole.classList.add('flying');
                    
                    const hideIdx = activeHole;
                    activeHole = -1; // Prevent double hitting
                    clearTimeout(moleTimeout);
                    
                    setTimeout(() => {
                        hitMole.classList.remove('active', 'flying');
                        setTimeout(popMole, Math.random() * 300 + 100);
                    }, 400);

                } else {
                    // Hit Empty Hole (Miss)
                    playSound('oops');
                    score -= 5;
                    combo = 0; // Reset combo
                    scoreEl.innerText = score;
                    
                    showFloatingText(clickX - 20, clickY - 40, '-5', false);
                    
                    // Screen shake
                    document.body.classList.remove('shake');
                    void document.body.offsetWidth; // trigger reflow
                    document.body.classList.add('shake');
                }
            });
            // Prevent default zooming/scrolling on mobile
            hole.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});
        });

        function randomHole() {
            let nextHole;
            do {
                nextHole = Math.floor(Math.random() * 9);
            } while (nextHole === activeHole);
            return nextHole;
        }

        function hideMole(missed = false) {
            if (activeHole !== -1) {
                moles[activeHole].classList.remove('active', 'flying');
                if (missed) {
                    combo = 0; // Reset combo if mole missed
                }
                activeHole = -1;
            }
            clearTimeout(moleTimeout);
        }

        function popMole() {
            if (!isPlaying) return;
            
            hideMole(false);
            
            activeHole = randomHole();
            moles[activeHole].classList.add('active');
            playSound('pop');

            // Set timeout for mole to hide automatically
            moleTimeout = setTimeout(() => {
                hideMole(true); // missed
                // Pop next mole shortly after hiding
                setTimeout(popMole, Math.random() * 400 + 200); 
            }, 1200); // Made slightly faster for fun
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            hideMole(false);
            statsBar.classList.remove('danger-time');
            finalScoreEl.innerText = score;
            modal.style.display = 'flex';
        }

        function updateTime() {
            timeLeft--;
            timeEl.innerText = timeLeft;
            
            if (timeLeft <= 5 && timeLeft > 0) {
                playSound('tick');
                statsBar.classList.add('danger-time');
            }
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            initAudio(); // Required to unlock Web Audio context in some browsers
            score = 0;
            timeLeft = 30;
            combo = 0;
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            statsBar.classList.remove('danger-time');
            modal.style.display = 'none';
            startModal.style.display = 'none';
            isPlaying = true;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(updateTime, 1000);
            
            // Initial pop
            setTimeout(popMole, 500);
        }

        // Global click to init audio (useful if user clicks outside before starting)
        document.body.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
